<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>

  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>

  <style>
    html, body { height: 100%; margin: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial; }
    #calendar { height: 100%; padding: 10px; box-sizing: border-box; }
  </style>
</head>
<body>
  <div id="calendar"></div>

  <script>
    let cal;

    function pickColor(status, reservationId) {
      if ((status || '').toUpperCase() === 'CANCELLED') return '#9CA3AF';
      const palette = ['#2563EB','#16A34A','#EA580C','#7C3AED','#DC2626','#0891B2','#CA8A04'];
      const idx = Math.abs(parseInt(reservationId || 0, 10)) % palette.length;
      return palette[idx];
    }

    function initCalendar() {
      const el = document.getElementById('calendar');
      cal = new FullCalendar.Calendar(el, {
        initialView: 'dayGridMonth',
        headerToolbar: {
          left: 'prev,next today',
          center: 'title',
          right: 'dayGridMonth,timeGridWeek,timeGridDay'
        },
        nowIndicator: true,
        eventTimeFormat: { hour: '2-digit', minute: '2-digit', hour12: false },

        datesSet: function(arg) {
          if (!window.calendarBridge || !window.calendarBridge.getEventsJson) return;
          const json = window.calendarBridge.getEventsJson(arg.startStr, arg.endStr);
          const raw = JSON.parse(json || '[]');
          const events = raw.map(e => {
            const c = pickColor(e.status, e.reservationId);
            return {
              title: e.title,
              start: e.start,
              end: e.end,
              backgroundColor: c,
              borderColor: c,
              extendedProps: { reservationId: e.reservationId, status: e.status }
            };
          });
          cal.removeAllEvents();
          cal.addEventSource(events);
        },

        eventClick: function(info) {
          if (window.calendarBridge && window.calendarBridge.onSelectReservation) {
            window.calendarBridge.onSelectReservation(info.event.extendedProps.reservationId);
          }
        }
      });
      cal.render();
    }

    function goToDate(isoDate) {
      if (cal) cal.gotoDate(isoDate);
    }

    window.goToDate = goToDate;
    window.addEventListener('load', initCalendar);
  </script>
</body>
</html>
